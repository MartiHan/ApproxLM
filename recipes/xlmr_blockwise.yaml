dispatcher_name: xlmr_blockwise
description: >
  Encoder-only XLM-R MASSIVE encoder-block ablation for swapped approximate
  multipliers. Each run keeps the classifier fp32 and the rest of the encoder
  int8_exact, then approximates all attention and FFN linear layers in one
  encoder block at a time.

metrics_to_plot:
  - accuracy
  - precision
  - recall
  - f1

base_config:
  task_type: classification
  model_url: qanastek/XLMRoberta-Alexa-Intents-Classification
  dataset_url: AmazonScience/massive
  trace_enabled: true
  attention_mode: cls_row

defaults:
  architecture: encoder_only
  num_encoder_layers: 12
  default_mode: int8_exact
  classifier_mode: fp32

experiments:
  - name: baseline_int8_exact_encoder_classifier_fp32
    label: baseline:int8_exact:encoder:classifier_fp32
    tags: [baseline, encoder_only, int8_exact, classifier_fp32]

sweeps:
  - multiplier: mul8s_1KVA
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

  - multiplier: mul8s_1KVB
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

  - multiplier: mul8s_1KVM
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

  - multiplier: mul8s_1KXF
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

  - multiplier: mul8s_1KR3
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

  - multiplier: mul8s_1KR6
    encoder_layer_scope: all
    include_all_encoder_layers: false
    include_single_encoder_blocks: true
    include_single_encoder_layers: false

