dispatcher_name: decoder_only_wiki2_25k_up_proj_reverse_multipliers_24
description: >
  Decoder-only WikiText-2 perplexity sweep over the first 25k tokenized test
  tokens. Attention projections stay fp32. MLP projections use int8_exact for
  the baseline, then all decoder up_proj layers are approximated together with
  mul8 multipliers in reverse order: 1KR3, 1KR6, 1KVB, 1KVA.

metrics_to_plot:
  - perplexity
  - avg_nll
  - reference_token_count

base_config:
  task_type: decoder_only
  model_url: Qwen/Qwen2-0.5B
  dataset_url: wikitext
  dataset_config: wikitext-2-raw-v1
  dataset_format: wikitext
  split_name: test
  max_samples: 0
  wikitext_token_limit: 25000
  max_input_length: 1024
  max_new_tokens: 0
  batch_size: 1
  perplexity_stride: 512
  calibration_batches: 16
  calibration_percentile: 99.9
  trust_remote_code: false
  do_sample: false
  temperature: 0.7
  top_k: 20
  bertscore_model: bert-base-uncased
  trace_enabled: false
  attention_mode:

defaults:
  architecture: decoder_only
  num_decoder_layers: 24
  default_mode: fp32
  attention_default_mode: fp32
  non_attention_default_mode: int8_exact

experiments:
  - name: baseline_attention_fp32_mlp_int8_exact
    label: baseline:attn_fp32:mlp_int8_exact
    tags: [baseline, decoder_only, attention_fp32, mlp_int8_exact]

sweeps:
  - multiplier: mul8s_1KR3
    decoder_layer_scope: up_proj
    include_all_decoder_layers: true
    include_single_decoder_blocks: false
    include_single_decoder_layers: false

  - multiplier: mul8s_1KR6
    decoder_layer_scope: up_proj
    include_all_decoder_layers: true
    include_single_decoder_blocks: false
    include_single_decoder_layers: false

  - multiplier: mul8s_1KVB
    decoder_layer_scope: up_proj
    include_all_decoder_layers: true
    include_single_decoder_blocks: false
    include_single_decoder_layers: false

  - multiplier: mul8s_1KVA
    decoder_layer_scope: up_proj
    include_all_decoder_layers: true
    include_single_decoder_blocks: false
    include_single_decoder_layers: false
