dispatcher_name: encoder_only_non_attention_all_multipliers
description: >
  Shared int8 baseline followed by non-attention encoder replacement sweeps for
  all supported mul8 multipliers. Each multiplier runs one "all encoders" case
  and one case per encoder block.

base_config:
  task_type: classification
  model_url: qanastek/XLMRoberta-Alexa-Intents-Classification
  dataset_url: AmazonScience/massive
  trace_enabled: true
  attention_mode: cls_row

defaults:
  architecture: encoder_only
  num_encoder_layers: 12
  default_mode: int8_exact
  classifier_mode: fp32

experiments:
  - name: baseline_int8_exact_all
    label: baseline:int8_exact:all
    tags: [baseline, encoder_only, int8_exact]

sweeps:
  - multiplier: mul8s_1KVA
    encoder_layer_scope: non_attention

  - multiplier: mul8s_1KVB
    encoder_layer_scope: non_attention

  - multiplier: mul8s_1KR6
    encoder_layer_scope: non_attention

  - multiplier: mul8s_1KR3
    encoder_layer_scope: non_attention
