dispatcher_name: encoder_only_custom_template
description: >
  Example custom dispatcher config for encoder-only classification experiments.
  Change `encoder_mode` to test another multiplier without rewriting full layer maps.

base_config:
  task_type: classification
  model_url: qanastek/XLMRoberta-Alexa-Intents-Classification
  dataset_url: AmazonScience/massive
  trace_enabled: true
  attention_mode: cls_row

defaults:
  architecture: encoder_only
  num_encoder_layers: 12
  default_mode: int8_exact
  classifier_mode: int8_exact

experiments:
  - name: baseline_int8_exact_all
    label: baseline:int8_exact:all
    tags: [baseline, encoder_only, int8_exact]

  - name: mul8s_1KVB_all_encoder_layers
    label: mul8s_1KVB:all
    tags: [all_layers, encoder_only, mul8s_1KVB]
    encoder_mode: mul8s_1KVB
    encoder_blocks: all

  - name: mul8s_1KVB_encoder_block_0
    label: mul8s_1KVB:encoder_0
    tags: [single_block, encoder_only, mul8s_1KVB]
    encoder_mode: mul8s_1KVB
    encoder_blocks: [0]

  - name: mul8s_1KVB_encoder_block_1
    label: mul8s_1KVB:encoder_1
    tags: [single_block, encoder_only, mul8s_1KVB]
    encoder_mode: mul8s_1KVB
    encoder_blocks: [1]
