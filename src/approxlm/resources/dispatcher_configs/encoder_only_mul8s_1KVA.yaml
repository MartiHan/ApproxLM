dispatcher_name: encoder_only_mul8s_1KVA
description: >
  Full encoder-only sweep for mul8s_1KVA: baseline with int8_exact on all
  encoder and classifier layers, one run with mul8s_1KVA on all encoder layers,
  and one run per encoder block.

base_config:
  task_type: classification
  model_url: qanastek/XLMRoberta-Alexa-Intents-Classification
  dataset_url: AmazonScience/massive
  trace_enabled: true
  attention_mode: cls_row

defaults:
  architecture: encoder_only
  num_encoder_layers: 12
  default_mode: int8_exact
  classifier_mode: fp32

experiments:
  - name: baseline_int8_exact_all
    label: baseline:int8_exact:all
    tags: [baseline, encoder_only, int8_exact]

  - name: mul8s_1KVA_all_encoder_layers
    label: mul8s_1KVA:all
    tags: [all_layers, encoder_only, mul8s_1KVA]
    encoder_mode: mul8s_1KVA
    encoder_blocks: all
    encoder_layer_scope: non_attention

  - name: mul8s_1KVA_encoder_block_0
    label: mul8s_1KVA:encoder_0
    tags: [single_block, encoder_only, mul8s_1KVA]
    encoder_mode: mul8s_1KVA
    encoder_blocks: [0]
    encoder_layer_scope: non_attention

  - name: mul8s_1KVA_encoder_block_1
    label: mul8s_1KVA:encoder_1
    tags: [single_block, encoder_only, mul8s_1KVA]
    encoder_mode: mul8s_1KVA
    encoder_blocks: [1]
    encoder_layer_scope: non_attention

  - name: mul8s_1KVA_encoder_block_2
    label: mul8s_1KVA:encoder_2
    tags: [single_block, encoder_only, mul8s_1KVA]
    encoder_mode: mul8s_1KVA
    encoder_blocks: [2]
    encoder_layer_scope: non_attention

  - name: mul8s_1KVA_encoder_block_3
    label: mul8s_1KVA:encoder_3
