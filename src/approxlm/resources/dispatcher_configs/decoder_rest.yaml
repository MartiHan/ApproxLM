dispatcher_name: decoder_only_alpaca_mul8s_1KR3_rest_dec17_27
description: >
  Resume the decoder-only Alpaca non-attention sweep after mul8s_1KR3 dec16.
  Runs only the remaining mul8s_1KR3 single-decoder-block experiments from dec17
  through dec27.

metrics_to_plot:
  - bleu
  - rouge_l
  - perplexity
  - bertscore_precision
  - bertscore_recall
  - bertscore_f1

base_config:
  task_type: decoder_only
  model_url: Qwen/Qwen3-0.6B-GPTQ-Int8
  dataset_url: tatsu-lab/alpaca
  dataset_config:
  split_name: train
  max_samples: 10
  max_input_length: 1024
  max_new_tokens: 128
  batch_size: 4
  calibration_batches: 16
  calibration_percentile: 99.9
  trust_remote_code: false
  do_sample: false
  temperature: 0.7
  top_k: 40
  bertscore_model: bert-base-uncased
  trace_enabled: false
  attention_mode:

defaults:
  architecture: decoder_only
  num_decoder_layers: 28
  default_mode: int8_exact

sweeps:
  - multiplier: mul8s_1KR3
    decoder_layer_scope: non_attention
    include_all_decoder_layers: false
    start_decoder_block: 17
    end_decoder_block: 27
